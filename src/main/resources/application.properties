# --- Production (PostgreSQL) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=compmanager
quarkus.datasource.password=compmanager
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/compmanager

# --- Hibernate ---
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true

# --- Flyway ---
quarkus.flyway.migrate-at-start=true

# --- Dev (H2) ---
%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=compmanager
%dev.quarkus.datasource.password=compmanager
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/compmanager
%dev.quarkus.hibernate-orm.database.generation=none
%dev.quarkus.flyway.migrate-at-start=true

# --- Test (H2) ---
%test.quarkus.datasource.devservices.enabled=false
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.username=sa
%test.quarkus.datasource.password=sa
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:compmanager-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%test.quarkus.hibernate-orm.database.generation=none
%test.quarkus.flyway.migrate-at-start=true